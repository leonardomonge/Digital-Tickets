name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: digitalticketscr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        working-directory: backend
        run: |
          docker build -t digitalticketscr.azurecr.io/backend:latest .
          docker push digitalticketscr.azurecr.io/backend:latest

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: digital-tickets-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: digitalticketscr.azurecr.io/backend:latest